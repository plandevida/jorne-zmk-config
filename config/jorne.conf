# Uncomment the following lines to enable the Jorne RGB Underglow
CONFIG_ZMK_RGB_UNDERGLOW=n
#CONFIG_WS2812_STRIP=y

CONFIG_ZMK_BACKLIGHT=n
CONFIG_ZMK_BACKLIGHT_AUTO_OFF_IDLE=y

# Uncomment the following line to enable the Jorne OLED Display
CONFIG_ZMK_DISPLAY=y
#CONFIG_ZMK_DISPLAY_STATUS_SCREEN_BUILT_IN=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y

# Nice oled addon (screen animation and more https://github.com/mctechnology17/zmk-nice-oled)
CONFIG_NICE_OLED_ON=y
CONFIG_NICE_OLED_SHOW_SLEEP_ART_ON_IDLE=y
CONFIG_NICE_OLED_SHOW_SLEEP_ART_ON_SLEEP=y

# CONFIG_NICE_OLED_WIDGET_WPM_SPEEDOMETER=y
CONFIG_NICE_OLED_WIDGET_WPM_BONGO_CAT=y
CONFIG_NICE_OLED_WIDGET_RESPONSIVE_BONGO_CAT=y
# CONFIG_NICE_OLED_WIDGET_WPM_GRAPH=y
# CONFIG_NICE_OLED_WIDGET_WPM_LUNA=y
# CONFIG_NICE_OLED_WIDGET_RESPONSIVE=y

CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL=y
# CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_WPM=y
CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_SMART_BATTERY=y
CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_CAT=y
# CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_HEAD=y
# CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_POKEMON=y
# CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_SPACEMAN=y

# Turn on logging, and set ZMK logging to debug output
# CONFIG_LOG=n
# CONFIG_ZMK_LOG_LEVEL_DBG=n

# Turn on USB CDC ACM device
#CONFIG_USB=y
CONFIG_USB_DEVICE_VID=0x1111
CONFIG_USB_DEVICE_PID=0x3333
CONFIG_USB_DEVICE_MANUFACTURER="Nebue"
CONFIG_ZMK_USB=y
#CONFIG_ZMK_USB_BOOT=y

# Bluetooth
CONFIG_BT=y
CONFIG_BT_BAS=y
CONFIG_ZMK_BLE=y
CONFIG_ZMK_SPLIT_BLE=y
#CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=n
#CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y

# Mouse
CONFIG_ZMK_MOUSE=y
CONFIG_ZMK_POINTING=y

# Battery
CONFIG_ZMK_BATTERY_REPORTING=y